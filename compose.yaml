# Phase 0/1 stack: app + Postgres only.
# MinIO (receipt object storage) returns in Phase 2 when receipt uploads are enabled;
# it's intentionally omitted now to keep the deploy minimal and avoid host-port conflicts.
services:
  app:
    build: .
    image: gemensams:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Prisma reads these two; built from the Postgres creds, with a working default
      # so the stack boots even before anything is set in the Coolify UI.
      # Override POSTGRES_PASSWORD BEFORE the first deploy (Postgres bakes it on init).
      POSTGRES_PRISMA_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gemensams_db_pw}@db:5432/${POSTGRES_DB:-postgres}
      POSTGRES_URL_NON_POOLING: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gemensams_db_pw}@db:5432/${POSTGRES_DB:-postgres}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://gemensams.krut.it}
      # Set these for a secure login (app still boots without them).
      APP_PASSWORD: ${APP_PASSWORD:-}
      APP_SECRET: ${APP_SECRET:-}
      # Receipt uploads arrive in Phase 2 — keep disabled for now.
      NEXT_PUBLIC_ENABLE_EXPENSE_DOCUMENTS: ${NEXT_PUBLIC_ENABLE_EXPENSE_DOCUMENTS:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gemensams_network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gemensams_db_pw}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # Initialize into a SUBDIRECTORY of the volume. A non-empty volume root
      # (lost+found, or a half-initialized data dir from a previously failed deploy)
      # otherwise makes Postgres exit immediately on startup.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gemensams_network

networks:
  gemensams_network:
    driver: bridge

volumes:
  postgres_data:
