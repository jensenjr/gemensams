services:
  app:
    build: .
    image: gemensams:latest
    ports:
      - 3000:3000
    env_file:
      - container.env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gemensams_network

  db:
    image: postgres:16-alpine
    expose:
      - 5432
    env_file:
      - container.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gemensams_network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000   # S3 API
      - 9001:9001   # MinIO web console
    env_file:
      - container.env
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gemensams_network

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - container.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/\"$${S3_UPLOAD_BUCKET}\" &&
      mc anonymous set download local/\"$${S3_UPLOAD_BUCKET}\" &&
      echo 'Bucket ready.'
      "
    networks:
      - gemensams_network

networks:
  gemensams_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
